services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pymander
      POSTGRES_PASSWORD: pymander
      POSTGRES_DB: pymander
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pymander"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/pymander
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p pymander 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # === Application services (use `docker compose --profile app up`) ===

  pymander-api:
    build: .
    command: uvicorn pymander.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    profiles: ["app"]

  # --- Ingestion services ---

  pymander-reddit:
    build: .
    command: python -m pymander.ingestion.adapters.reddit
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-news:
    build: .
    command: python -m pymander.ingestion.adapters.news
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-twitter:
    build: .
    command: python -m pymander.ingestion.adapters.twitter
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-4chan:
    build: .
    command: python -m pymander.ingestion.adapters.fourchan
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-telegram:
    build: .
    command: python -m pymander.ingestion.adapters.telegram
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-youtube:
    build: .
    command: python -m pymander.ingestion.adapters.youtube
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-wikipedia:
    build: .
    command: python -m pymander.ingestion.adapters.wikipedia
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-bluesky:
    build: .
    command: python -m pymander.ingestion.adapters.bluesky
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-substack:
    build: .
    command: python -m pymander.ingestion.adapters.substack
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-ingestion:
    build: .
    command: python -m pymander.pipeline.ingestion_consumer
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  # --- Pipeline services ---

  pymander-embedding:
    build: .
    command: python -m pymander.pipeline.embedding
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles: ["app"]

  pymander-clustering:
    build: .
    command: python -m pymander.pipeline.clustering
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-engagement:
    build: .
    command: python -m pymander.pipeline.engagement_poller
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-image-hasher:
    build: .
    command: python -m pymander.pipeline.image_hasher
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  # --- Intelligence services ---

  pymander-graph-builder:
    build: .
    command: python -m pymander.network.graph_builder
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["app"]

  pymander-co-narrative:
    build: .
    command: python -m pymander.network.co_narrative
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["app"]

  pymander-graph-analytics:
    build: .
    command: python -m pymander.network.analytics
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["app"]

  pymander-coordination:
    build: .
    command: python -m pymander.intelligence.coordination
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["app"]

  pymander-identity:
    build: .
    command: python -m pymander.intelligence.identity
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["app"]

  pymander-behavioral:
    build: .
    command: python -m pymander.intelligence.behavioral_signals
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    profiles: ["app"]

  pymander-briefings:
    build: .
    command: python -m pymander.intelligence.briefings
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["app"]

  pymander-predictions:
    build: .
    command: python -m pymander.intelligence.prediction
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["app"]

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
